<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasse 7 - Mixed Grammar Mastery</title>
    <style>
        :root {
            --grade-color: #10b981;
            --bg-gradient: linear-gradient(135deg, #0f4c75 0%, #001f3f 100%);
            --card-bg: rgba(255, 255, 255, 0.08);
            --text-color: #e6f7ff;
            --success-color: #4caf50;
            --error-color: #f44336;
            --warning-color: #ff9800;
            --gold: #ffd700;
            --neutral-border: rgba(255, 255, 255, 0.3);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient); background-attachment: fixed;
            color: var(--text-color); margin: 0; padding: 0; min-height: 100vh;
        }

        .container { width: 100%; max-width: 1100px; padding: 40px 20px; margin: 0 auto; box-sizing: border-box; }
        .view { display: none; width: 100%; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header { text-align: center; margin-bottom: 40px; }
        h1 { color: #90caf9; text-shadow: 0 0 15px rgba(16, 185, 129, 0.4); font-size: 2.5rem; margin-bottom: 10px; }

        .info-box {
            background: rgba(16, 185, 129, 0.1); border: 2px solid var(--grade-color); border-radius: 15px; padding: 20px;
            margin-bottom: 30px; box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); text-align: left;
        }
        .info-box h4 { margin-top: 0; color: var(--grade-color); font-size: 1.2rem; }
        .info-box .example-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border-left: 4px solid var(--grade-color); margin-bottom: 10px; }
        .info-box .example-sentence { font-style: italic; color: var(--gold); display: block; margin-top: 5px; }

        .category-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .category { background-color: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-top: 5px solid var(--grade-color); }
        .category h2 { color: var(--grade-color); border-bottom: 2px solid rgba(16,185,129,0.2); padding-bottom: 10px; margin-top: 0; font-size: 1.4rem; }
        .button-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }

        .exercise-button {
            padding: 15px; color: white; background: rgba(16,185,129,0.15); border: 1px solid var(--grade-color);
            border-radius: 12px; font-weight: bold; cursor: pointer; text-align: left; transition: 0.3s; display: flex; justify-content: space-between; align-items: center;
        }
        .exercise-button:hover { background: var(--grade-color); color: #001f3f; }
        .exercise-button.completed { border: 2px solid var(--gold); }
        .exercise-button.completed::after { content: "★ Badge"; font-size: 0.75rem; background: var(--gold); color: #000; padding: 2px 8px; border-radius: 10px; }

        .accordion-item { background: rgba(255,255,255,0.05); border-radius: 15px; margin-bottom: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .accordion-header { padding: 18px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; background: rgba(255,255,255,0.02); }
        .accordion-header:hover { background: rgba(255,255,255,0.05); }
        .accordion-content { display: none; padding: 25px; border-top: 1px solid rgba(255,255,255,0.1); }
        .accordion-item.active .accordion-content { display: block; }
        .accordion-item.done { border-color: var(--success-color); }

        /* Styles for Specific Exercise Types */
        .pool { margin-bottom: 25px; min-height: 80px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; text-align: center; }
        .sort-item { background: var(--grade-color); color: #001f3f; padding: 8px 14px; border-radius: 6px; margin: 6px; cursor: pointer; display: inline-block; font-weight: bold; user-select: none; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .sort-item:hover { transform: scale(1.05); }
        .sort-container, .puzzle-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .sort-box, .puzzle-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; min-height: 150px; border: 2px dashed rgba(255,255,255,0.2); text-align: center; cursor: pointer; }
        .puzzle-container { grid-template-columns: repeat(4, 1fr); gap: 10px; }
        
        .scramble-item { margin-bottom: 25px; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; border-left: 5px solid #1e88e5; }
        .scramble-pool, .scramble-result { display: flex; flex-wrap: wrap; gap: 10px; min-height: 45px; padding: 10px; }
        .scramble-word { background: #1e88e5; padding: 6px 14px; border-radius: 6px; cursor: pointer; user-select: none; }
        .scramble-result { border-bottom: 2px solid var(--grade-color); background: rgba(0,0,0,0.2); border-radius: 5px; }

        .timeline-item { margin-bottom: 25px; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; }
        .timeline-sentence { background: rgba(255, 255, 255, 0.05); padding: 12px 15px; border-radius: 8px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); margin-top: 10px; position: relative; }
        .timeline-sentence.selected { background: var(--grade-color); color: #001f3f; font-weight: bold; border-color: #fff; }
        .order-num { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4); color: #fff; width: 24px; height: 24px; text-align: center; border-radius: 50%; line-height: 24px; font-size: 0.8rem; }

        .cloze-text { font-size: 1.1rem; line-height: 2.8; text-align: left; }
        .gap-input { width: 150px; padding: 8px; border: 2px solid var(--neutral-border); border-radius: 8px; background: rgba(0,0,0,0.4); color: white; text-align: center; font-size: 1rem; transition: border-color 0.3s; }
        .gap-input:focus { border-color: var(--grade-color); outline: none; }
        .gap-input.correct { border-color: var(--success-color); background: rgba(76, 175, 80, 0.2); }
        .gap-input.incorrect { border-color: var(--error-color); background: rgba(244, 67, 54, 0.2); }
        .gap-input.warning { border-color: var(--warning-color); background: rgba(255, 152, 0, 0.2); }
        .feedback-box { color: #ff9e9e; font-size: 0.9em; margin-top: 5px; padding: 8px; border-left: 3px solid var(--error-color); background: rgba(244, 67, 54, 0.1); display: none; border-radius: 5px; }
        .feedback-box.warning { color: var(--warning-color); border-left-color: var(--warning-color); background: rgba(255, 152, 0, 0.1); }
        .task-instruction { margin-bottom: 15px; font-weight: bold; color: var(--gold); background: rgba(255, 215, 0, 0.1); padding: 10px; border-radius: 8px; border-left: 4px solid var(--gold); }

        .mc-item { margin-bottom: 20px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; }
        .mc-options { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .mc-btn { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--grade-color); background: transparent; color: white; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .mc-btn.correct { background: var(--success-color); border-color: white; }
        .mc-btn.wrong { animation: shake 0.4s ease; background: var(--error-color); border-color: white; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .factory-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .factory-table th, .factory-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .factory-table th { color: var(--grade-color); }
        
        .race-track { height: 60px; background: rgba(0,0,0,0.4); border-radius: 30px; position: relative; margin: 30px 0; border: 2px solid var(--grade-color); overflow: hidden; }
        .race-finish { position: absolute; right: 0; top: 0; bottom: 0; width: 40px; background: repeating-linear-gradient(45deg, #fff, #fff 10px, #000 10px, #000 20px); opacity: 0.5; }
        .race-avatar { position: absolute; left: 0; top: 50%; transform: translateY(-50%) scaleX(-1); font-size: 2.5rem; transition: left 0.5s ease; z-index: 2; }

        .check-group { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; }
        .check-group label { margin-left: 5px; cursor: pointer; }

        .master-badge { display: none; background: linear-gradient(145deg, #ffd700, #b8860b); color: #000; padding: 25px; border-radius: 20px; margin-top: 40px; font-weight: bold; text-align: center; box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); }
        .back-btn { background: transparent; border: 1.5px solid var(--grade-color); color: var(--grade-color); padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>

                <div class="accordion-item" id="item-ex1"><div class="accordion-header" onclick="toggleAccordion(1)"><span id="label-ex1">Exercise 1</span><span class="status-icon" id="status-ex1">🔒 Locked</span></div><div class="accordion-content" id="content-ex1"></div></div>

                <div class="accordion-item" id="item-ex4"><div class="accordion-header" onclick="toggleAccordion(4)"><span id="label-ex4">Exercise 4</span><span class="status-icon" id="status-ex4">🔒 Locked</span></div><div class="accordion-content" id="content-ex4"></div></div>
                <div class="accordion-item" id="item-ex5"><div class="accordion-header" onclick="toggleAccordion(5)"><span id="label-ex5">Exercise 5</span><span class="status-icon" id="status-ex5">🔒 Locked</span></div><div class="accordion-content" id="content-ex5"></div></div>

    <script>
        const secretKey = "IGNAZ-REDER-KEY-2024";
        let state = JSON.parse(localStorage.getItem('grammar_g7_vfinal_topicbadges_fix')) || {};
        let currentTopicId = null;
        let activeSortingElement = null;
        let timelineSelections = {}; 
        let raceProgress = 0;

        const irregulars = [
            { de: "sein", inf: "be", past: "was/were", pp: "been" }, { de: "kaufen", inf: "buy", past: "bought", pp: "bought" }, { de: "gehen", inf: "go", past: "went", pp: "gone" },
            { de: "essen", inf: "eat", past: "ate", pp: "eaten" }, { de: "finden", inf: "find", past: "found", pp: "found" }, { de: "sehen", inf: "see", past: "saw", pp: "seen" },
            { de: "sprechen", inf: "speak", past: "spoke", pp: "spoken" }, { de: "schreiben", inf: "write", past: "wrote", pp: "written" }, { de: "trinken", inf: "drink", past: "drank", pp: "drunk" },
            { de: "kommen", inf: "come", past: "came", pp: "come" }, { de: "machen", inf: "make", past: "made", pp: "made" }, { de: "geben", inf: "give", past: "gave", pp: "given" }
        ];

        const topicMeta = {
            '7_SP_PP': { title: "Simple Past vs. Present Perfect", count: 5, labels: ["Signal Word Sorting", "Sentence Scramble", "Exploring London", "Life in a New Town", "Liverpool Highlights"], info: `<h4>Grammar Check</h4><div class="example-box"><b>Simple Past:</b> Finished action. <i>I visited London yesterday.</i><br><b>Present Perfect:</b> Connection to now. <i>I have already visited Paris.</i></div>` },
            '7_PP_PROG': { title: "Present Perfect Progressive", count: 5, labels: ["Since vs For", "Formation Scramble", "Exam Stress", "Exploring Edinburgh", "A Week in Glasgow"], info: `<h4>Grammar Check</h4><div class="example-box">Focus on <b>duration</b>. <i>She has been waiting for an hour.</i></div>` },
            '7_PAST_PERF': { title: "Past Perfect", count: 5, labels: ["Timeline Check", "Matching", "Highland Hike", "Stirling Castle", "Loch Ness Mystery"], info: `<h4>Grammar Check</h4><div class="example-box">Action BEFORE another past action. <i>The bus had already left when I arrived.</i></div>` },
            '7_MODALS': { title: "must/have to", count: 3, labels: ["School Rules (Present)", "Stirling Trip (Past)", "Life in a Boarding School", "", ""], info: `<h4>Grammar Check</h4><div class="example-box">Present: <b>must/have to</b>. Past: <b>had to</b>. No need: <b>don't have to</b>.</div>` },
            '7_REL_CL': { title: "Relative Clauses", count: 5, labels: ["Logic Puzzle", "Truth Detector", "Sentence Joiner", "Highland Legends", "Scottish Life"], info: `<h4>Grammar Check</h4><div class="example-box">who (people), which (things), where (places), whose (possession).</div>` },
            '7_ADV': { title: "Adverbs", count: 5, labels: ["The L-Factory", "The Speed Race", "The Sports Festival", "Talk", "Visiting Edinburgh"], info: `<h4>Grammar Check</h4><div class="example-box">Adjective + <b>ly</b>. quick -> quickly. Exceptions: good -> well, fast -> fast.</div>` },
            '7_IF_01': { title: "If-clauses types 0/1", count: 3, labels: ["Type 0: Facts", "Type 1: Plans", "Type Mix"], info: `<h4>If 0 & 1</h4><div class="example-box">0: If + present, present.<br>1: If + present, will-future.</div>` },
            '7_IF_2': { title: "If-clauses type 2", count: 4, labels: ["Daydreams", "Advice", "Hypothetical", "The Big Mix (0,1,2)"], info: `<h4>If 2</h4><div class="example-box">If + simple past, would + verb.</div>` },
            '6_PAST': { title: "Simple Past (Wiederholung)", count: 5, labels: ["Irregular Verbs Factory", "Signal Word Sorter", "The Weekend", "School Experience", "Trip to London"], info: `<h4>Simple Past</h4><div class="example-box">Regular: -ed. Irregular: see list.</div>` },
            '6_PAST_PROG': { title: "Past Progressive (Wiederholung)", count: 5, labels: ["Was or Were? (Warm-up)", "The -ing Forge", "A Strange Day", "Family Chaos", "The Accident (Mix)"], info: `<h4>Past Progressive</h4><div class="example-box"><b>Form:</b> was/were + verb-ing.<br><b>Use:</b> Action in progress at a specific time in the past.</div>` },
            '6_PAST_CONT': { title: "Simple Past vs. Past Progressive", count: 5, labels: ["Background Check", "The -ing Forge", "Police Report", "Sports Report", "A Scary Night"], info: `<h4>Simple vs. Progressive</h4><div class="example-box"><b>Progressive:</b> Background action / Scene (was/were -ing).<br><b>Simple:</b> Sudden event / Interrupting action.</div>` },
            '6_PRES_PERF': { title: "Present Perfect (Wiederholung)", count: 5, labels: ["Since or For?", "Irregular Gap", "General Cloze", "Questions", "Mixed Practice"], info: `<h4>Present Perfect</h4><div class="example-box"><b>Form:</b> have/has + past participle.<br><b>Use:</b> Result, Experience, Change.</div>` },
            '6_FUTURE': { title: "will future / going to future", count: 5, labels: ["Plan or Spontaneous?", "Predict Your Future!", "Summer Holidays", "The Birthday Party", "The Fortune Teller"], info: `<h4>Future Forms</h4><div class="example-box"><b>going to:</b> Fixed plans or evidence.<br><b>will:</b> Spontaneous decisions, predictions, promises.</div>` },
            '5_PRES_CONTRAST': { 
                title: "Simple Present vs. Present Progressive", 
                count: 5, 
                labels: ["My Morning Routine", "Hobbies & Free Time", "School vs. Holidays", "London Alive", "Postcard from Scotland"], 
                info: `<h4>Present Tenses</h4><div class="example-box"><b>Simple:</b> Habit/Fact (always, usually). <br><b>Progressive:</b> Now (look, at the moment).</div>` 
            }
        };

        const exerciseData = {
            '7_SP_PP_1': { type: 'sort', left: "Simple Past", right: "Present Perfect", items: [{word:'yesterday',cat:'left'},{word:'already',cat:'right'},{word:'last week',cat:'left'},{word:'yet',cat:'right'},{word:'ago',cat:'left'},{word:'since',cat:'right'},{word:'in 2010',cat:'left'},{word:'just',cat:'right'},{word:'never',cat:'right'},{word:'last night',cat:'left'}] },
            '7_SP_PP_2': { type: 'scramble', sentences: [{correct:"I have already finished my homework", words:["finished","have","already","I","homework","my"]},{correct:"She did not go to school yesterday", words:["did","not","to","go","school","yesterday","She"]},{correct:"Have you ever been to London", words:["Have","you","ever","been","to","London"]},{correct:"We bought a new car last week", words:["bought","We","car","new","a","week","last"]},{correct:"They have not seen the film yet", words:["film","They","not","have","seen","the","yet"]},{correct:"Did you play football yesterday", words:["play","you","Did","football","yesterday"]},{correct:"He has just arrived at the station", words:["arrived","has","just","He","the","at","station"]},{correct:"I lost my keys two days ago", words:["keys","my","I","lost","ago","days","two"]},{correct:"We have lived here since 2015", words:["here","lived","have","We","2015","since"]},{correct:"Did she call you last night", words:["she","call","Did","you","night","last"]}] },
            '7_SP_PP_3': { type: 'cloze', items: [{textBefore:"Last week I", prompt:"(go)", textAfter:"to London.", correct:["went"]},{textBefore:"I", prompt:"(never / be)", textAfter:"there before.", correct:["had never been","have never been"]},{textBefore:"Yesterday I", prompt:"(see)", textAfter:"the Tower.", correct:["saw"]},{textBefore:"I", prompt:"(already / visit)", textAfter:"three museums.", correct:["have already visited"]},{textBefore:"I", prompt:"(not / buy)", textAfter:"postcards yet.", correct:["have not bought","haven't bought"]},{textBefore:"Ten years ago my dad", prompt:"(work)", textAfter:"here.", correct:["worked"]},{textBefore:"I", prompt:"(just / finish)", textAfter:"my lunch.", correct:["have just finished"]},{textBefore:"We", prompt:"(be)", textAfter:"at the hotel at 5 pm.", correct:["were"]},{textBefore:"", prompt:"(you / buy)", textAfter:"that shirt yesterday?", correct:["Did you buy"]},{textBefore:"Yes, I", prompt:"(do)", textAfter:".", correct:["did"]}] },

        // --- CORE FUNCTIONS ---
        function showView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById('view-' + id).classList.add('active'); window.scrollTo(0,0); }

        function showTopic(id) {
            currentTopicId = id; const meta = topicMeta[id];
            document.getElementById('topic-title').innerText = meta.title;
            document.getElementById('topic-info').innerHTML = meta.info;
            document.getElementById('master-badge-name').innerText = meta.title;
            for(let i=1; i<=5; i++) {
                const item = document.getElementById('item-ex'+i);
                if(i > meta.count) item.style.display = "none";
                else { 
                    item.style.display = "block"; 
                    document.getElementById('label-ex'+i).innerText = `Ex ${i}: ${meta.labels[i-1]}`; 
                    document.getElementById('content-ex'+i).innerHTML = ""; 
                    updateStatus(i); 
                }
            }
            checkMaster(); showView('topic');
        }

        function toggleAccordion(num) {
            const item = document.getElementById('item-ex'+num); const isActive = item.classList.contains('active');
            document.querySelectorAll('.accordion-item').forEach(i => i.classList.remove('active'));
            if(!isActive) { item.classList.add('active'); renderEx(num); }
        }

        function renderEx(num) {
            const container = document.getElementById('content-ex'+num);
            if(container.innerHTML !== "") return;
            const fullId = `${currentTopicId}_${num}`;
            const data = exerciseData[fullId];
            
            if(fullId === '6_PAST_1') { renderIrregular(container); return; }
            if(!data) { container.innerHTML = "In Kürze..."; return; }

            if(data.type === 'sort') renderSort(fullId, container);
            else if(data.type === 'spelling') renderSpelling(fullId, container);
            else if(data.type === 'background') renderBackgroundCheck(fullId, container);
            else if(data.type === 'scramble') renderScramble(fullId, container);
            else if(data.type === 'timeline') renderTimeline(fullId, container);
            else if(data.type === 'factory') renderFactory(fullId, container);
            else if(data.type === 'puzzle') renderPuzzle(fullId, container);
            else if(data.type === 'mc') renderMC(fullId, container, false);
            else if(data.type === 'race') renderMC(fullId, container, true);
            else if(data.type === 'join') renderJoin(fullId, container);
            else renderCloze(fullId, container);
        }

        // --- NEW RENDERER: BACKGROUND CHECK ---
        function renderBackgroundCheck(id, container) {
            const d = exerciseData[id];
            let h = `<p>Which sentences describe the <b>background (Progressive)</b>?</p><div class="check-group-container">`;
            d.items.forEach((it, i) => {
                h += `<div class="check-group"><input type="checkbox" id="bg-${i}"> <label for="bg-${i}">${it.s}</label></div>`;
            });
            h += `</div><button class="exercise-button" style="margin:20px auto; display:block;" onclick="checkBackground('${id}')">Check</button>`;
            container.innerHTML = h;

            window.checkBackground = (xid) => {
                const items = exerciseData[xid].items;
                let allCorrect = true;
                items.forEach((it, i) => {
                    const cb = document.getElementById(`bg-${i}`);
                    const parent = cb.parentElement;
                    if (cb.checked === it.isBG) {
                        parent.style.backgroundColor = "rgba(76, 175, 80, 0.3)"; // Green
                    } else {
                        parent.style.backgroundColor = "rgba(244, 67, 54, 0.3)"; // Red
                        allCorrect = false;
                    }
                });
                if(allCorrect) markDone(1);
            };
        }

        // --- NEW RENDERER: SPELLING ---
        function renderSpelling(id, container) {
            const d = exerciseData[id];
            let h = `<table class="factory-table"><thead><tr><th>Infinitive</th><th>-ing Form</th></tr></thead><tbody>`;
            d.items.forEach((it, i) => {
                h += `<tr><td>${it.inf}</td><td><input type="text" id="spl-${id}-${i}" class="gap-input" style="width:150px" data-correct="${it.correct}" ${it.warning ? `data-warn="${it.warning}"` : ''} autocomplete="off"> <span id="spl-fb-${id}-${i}" style="margin-left:10px; font-size:0.9rem;"></span></td></tr>`;
            });
            h += `</tbody></table><button class="exercise-button" style="margin:20px auto; display:block;" onclick="checkSpelling('${id}')">Check</button>`;
            container.innerHTML = h;
            
            window.checkSpelling = (xid) => {
                const items = exerciseData[xid].items;
                let corrects = 0;
                items.forEach((it, i) => {
                    const el = document.getElementById(`spl-${xid}-${i}`);
                    const fb = document.getElementById(`spl-fb-${xid}-${i}`);
                    const val = el.value.toLowerCase().trim();
                    
                    if (val === it.correct) {
                        el.className = "gap-input correct";
                        fb.innerText = "✓"; fb.style.color = "var(--success-color)";
                        corrects++;
                    } else if (it.warning && val === it.warning) {
                        el.className = "gap-input warning";
                        fb.innerText = "⚠️ Watch out! The -e disappears!"; fb.style.color = "var(--warning-color)";
                    } else {
                        el.className = "gap-input incorrect";
                        fb.innerText = "✗"; fb.style.color = "var(--error-color)";
                    }
                });
                if(corrects === items.length) markDone(xid.split('_').pop());
            };
        }

        // --- EXISTING RENDERERS ---
        function renderTimeline(id, container) {
            const d = exerciseData[id]; container.innerHTML = "<p>Ordne chronologisch!</p>";
            timelineSelections[id] = d.scenarios.map(()=>[]);
            d.scenarios.forEach((sc, i) => {
                const w = document.createElement('div'); w.className='timeline-item';
                w.innerHTML = `<strong>${sc.scenario}</strong><div id="tl-fb-${id}-${i}"></div>`;
                const list = document.createElement('div'); list.className='timeline-sentences';
                [...sc.events].sort(()=>0.5-Math.random()).forEach(ev => {
                    const div = document.createElement('div'); div.className='timeline-sentence'; div.innerText=ev.text;
                    div.onclick = () => {
                        const sel = timelineSelections[id][i]; const idx = sel.indexOf(ev);
                        if(idx > -1) sel.splice(idx,1); else if(sel.length < 3) sel.push(ev);
                        // UI update
                        Array.from(list.children).forEach(ch => {
                            const found = sc.events.find(e => e.text === ch.innerText.replace(/\s\d$/, ""));
                            const order = sel.indexOf(found);
                            if(order > -1) { ch.className="timeline-sentence selected"; ch.innerHTML=`${found.text} <span class="order-num">${order+1}</span>`; }
                            else { ch.className="timeline-sentence"; ch.innerText=found.text; }
                        });
                    };
                    list.appendChild(div);
                });
                w.appendChild(list); container.appendChild(w);
            });
            const btn = document.createElement('button'); btn.className='exercise-button'; btn.style.margin="10px auto"; btn.innerText="Check";
            btn.onclick = () => {
                let ok = true; d.scenarios.forEach((sc, i) => {
                    const sel = timelineSelections[id][i];
                    const fb = document.getElementById(`tl-fb-${id}-${i}`);
                    if(sel.length < 3 || !sel.every((e, pos) => e.pos === pos)) { ok = false; fb.innerHTML="<span style='color:orange'>Prüfen!</span>"; }
                    else fb.innerHTML="<span style='color:#4caf50'>OK!</span>";
                });
                if(ok) markDone(id.split('_').pop());
            };
            container.appendChild(btn);
        }

        function renderIrregular(container) {
            const sel = [...irregulars].sort(()=>0.5-Math.random()).slice(0,10);
            let h = `<table class="factory-table"><thead><tr><th>Deutsch</th><th>Infinitive</th><th>Past</th><th>Participle</th></tr></thead><tbody>`;
            sel.forEach((v, i) => h+=`<tr><td>${v.de}</td><td>to <input id="ii-${i}" class="gap-input" style="width:80px" data-ans="${v.inf}" autocomplete="off"></td><td><input id="ip-${i}" class="gap-input" style="width:80px" data-ans="${v.past}" autocomplete="off"></td><td><input id="ipp-${i}" class="gap-input" style="width:80px" data-ans="${v.pp}" autocomplete="off"></td></tr>`);
            h += `</tbody></table><button class="exercise-button" style="margin:20px auto" onclick="checkIrr()">Check</button><button class="exercise-button" onclick="renderEx(1)">Neu</button>`;
            container.innerHTML = h;
            window.checkIrr = () => {
                let ok=0; sel.forEach((v,i) => {
                    let rok=true; ['ii','ip','ipp'].forEach((p, idx) => {
                        const el = document.getElementById(`${p}-${i}`); const ans = idx===0?v.inf:idx===1?v.past:v.pp;
                        if(ans.split('/').includes(el.value.toLowerCase().trim())) el.className="gap-input correct"; else { el.className="gap-input incorrect"; rok=false; }
                    });
                    if(rok) ok++;
                });
                if(ok===10) markDone(1);
            };
        }

        function renderSort(id, container) {
            const d = exerciseData[id]; 
            container.innerHTML = `<p>Wort -> Box!</p><div id="p-${id}" class="pool"></div><div class="sort-container"><div class="sort-box" id="bl-${id}"><strong>${d.left}</strong><hr></div><div class="sort-box" id="br-${id}"><strong>${d.right}</strong><hr></div></div><button class="exercise-button" style="margin:20px auto" onclick="checkSort('${id}')">Check</button>`;
            const p = document.getElementById('p-'+id);
            [...d.items].sort(()=>0.5-Math.random()).forEach(it => {
                const s = document.createElement('span'); s.className='sort-item'; s.innerText=it.word;
                s.onclick = (e) => { e.stopPropagation(); activeSortingElement=s; document.querySelectorAll('.sort-item').forEach(x=>x.style.boxShadow="none"); s.style.boxShadow="0 0 10px white"; };
                p.appendChild(s);
            });
            container.querySelector('#bl-'+id).onclick = () => { if(activeSortingElement){ document.getElementById('bl-'+id).appendChild(activeSortingElement); activeSortingElement.style.boxShadow="none"; activeSortingElement=null; } };
            container.querySelector('#br-'+id).onclick = () => { if(activeSortingElement){ document.getElementById('br-'+id).appendChild(activeSortingElement); activeSortingElement.style.boxShadow="none"; activeSortingElement=null; } };
            window.checkSort = (xid) => {
                let err=0; exerciseData[xid].items.forEach(o => { const el=Array.from(document.querySelectorAll('.sort-item')).find(x=>x.innerText===o.word); if(!el || !el.parentElement.id.includes(o.cat==='left'?'bl':'br')) err++; });
                if(err===0) markDone(xid.split('_').pop()); else alert("Fehler gefunden!");
            };
        }

        function renderScramble(id, container) {
            const d = exerciseData[id];
            d.sentences.forEach((s, idx) => {
                const w = document.createElement('div'); w.className="scramble-item";
                const p = document.createElement('div'); p.className="scramble-pool";
                const r = document.createElement('div'); r.className="scramble-result"; r.id=`scr-res-${id}-${idx}`;
                [...s.words].sort(()=>0.5-Math.random()).forEach(word => {
                    const sp = document.createElement('span'); sp.className="scramble-word"; sp.innerText=word;
                    sp.onclick = () => { if(sp.parentElement===p) r.appendChild(sp); else p.appendChild(sp); };
                    p.appendChild(sp);
                });
                w.appendChild(p); w.appendChild(r); container.appendChild(w);
            });
            const btn = document.createElement('button'); btn.className='exercise-button'; btn.innerText="Check"; btn.style.margin="20px auto"; 
            btn.onclick = () => {
                let ok=0; d.sentences.forEach((s, i) => {
                    const txt = Array.from(document.getElementById(`scr-res-${id}-${i}`).children).map(c=>c.innerText).join(' ');
                    if(txt.toLowerCase() === s.correct.toLowerCase()) ok++;
                });
                if(ok===d.sentences.length) markDone(id.split('_').pop()); else alert(ok + " / " + d.sentences.length + " richtig.");
            };
            container.appendChild(btn);
        }

        function renderCloze(id, container) {
            const d = exerciseData[id]; if(!d) return; 
            const items = d.items || d; 
            let h = `<div class="cloze-text">${d.instruction ? `<div class="task-instruction">${d.instruction}</div>` : ''}`;
            items.forEach((item, i) => {
                h += `${item.textBefore} <span class="gap-input-wrapper"><input type="text" id="gap-${id}-${i}" class="gap-input" autocomplete="off" spellcheck="false">${item.prompt?`<span class="gap-prompt">${item.prompt}</span>`:""}</span> ${item.textAfter} <div id="fb-${id}-${i}" class="feedback-box"></div>`;
            });
            h += `</div><button class="exercise-button" style="margin:20px auto; display:block;" onclick="checkCloze('${id}')">Check</button>`;
            container.innerHTML = h;
            window.checkCloze = (xid) => {
                const dt = exerciseData[xid]; const its = dt.items || dt; let ok = 0;
                its.forEach((it, i) => {
                    const el = document.getElementById(`gap-${xid}-${i}`); const fb = document.getElementById(`fb-${xid}-${i}`);
                    const val = el.value.toLowerCase().trim();
                    const correctArr = it.correct.map(x=>x.toLowerCase().trim());
                    
                    // --- Special 3rd Person Check ---
                    if (val === "have" && correctArr.some(c => c.startsWith("has "))) {
                        el.className = "gap-input warning";
                        fb.innerHTML = "Remember: He, she, it – das 's' muss mit!";
                        fb.className = "feedback-box warning";
                        fb.style.display = "block";
                        return; // Stop processing this field for now
                    }

                    if(correctArr.includes(val)) { 
                        el.className="gap-input correct"; fb.style.display="none"; ok++; 
                    } else { 
                        el.className="gap-input incorrect"; 
                        fb.innerHTML=`Lösung: <b>${it.correct[0]}</b>`; 
                        fb.className = "feedback-box";
                        fb.style.display="block"; 
                    }
                });
                if(ok === its.length) markDone(xid.split('_').pop());
            };
        }

        function renderPuzzle(id, container) {
            const d = exerciseData[id]; container.innerHTML = "<p>Begriff -> Spalte!</p><div id='p-pool-"+id+"' class='pool'></div><div class='puzzle-container'></div>";
            const grid = container.querySelector('.puzzle-container');
            d.cols.forEach(col => {
                const b = document.createElement('div'); b.className='puzzle-box'; b.id=`pz-${col}`; b.innerHTML=`<h5>${col}</h5>`;
                b.onclick = () => { if(activeSortingElement){ b.appendChild(activeSortingElement); activeSortingElement.style.boxShadow="none"; activeSortingElement=null; } };
                grid.appendChild(b);
            });
            [...d.items].sort(()=>0.5-Math.random()).forEach(it => {
                const s = document.createElement('span'); s.className='sort-item'; s.innerText=it.text;
                s.onclick=(e)=>{e.stopPropagation(); activeSortingElement=s; s.style.boxShadow="0 0 10px white";};
                document.getElementById('p-pool-'+id).appendChild(s);
            });
            const btn = document.createElement('button'); btn.className='exercise-button'; btn.style.cssText="margin:20px auto; display:block;"; btn.innerText="Check";
            btn.onclick=()=>{
                let err=0; d.items.forEach(o=>{const el=Array.from(document.querySelectorAll('.sort-item')).find(x=>x.innerText===o.text); if(!el || el.parentElement.id!==`pz-${o.cat}`) err++;});
                if(err===0) markDone(1); else alert("Fehler!");
            };
            container.appendChild(btn);
        }

        function renderMC(id, container, isRace) {
            const d = exerciseData[id]; raceProgress = 0;
            if(isRace) container.innerHTML = `<div class="race-track"><div class="race-finish"></div><div id="runner" class="race-avatar">🏃</div></div><div id="mc-box-${id}"></div>`;
            else container.innerHTML = `<div id="mc-box-${id}"></div>`;
            const box = document.getElementById(`mc-box-${id}`);
            const renderQ = (idx) => {
                if(idx >= d.questions.length) { box.innerHTML = "Done!"; markDone(id.split('_').pop()); return; }
                const q = d.questions[idx]; box.innerHTML = `<div class="mc-item"><div>${idx+1}. ${q.text.replace("___", "______")}</div><div class="mc-options"></div></div>`;
                q.options.forEach(opt => {
                    const btn = document.createElement('button'); btn.className="mc-btn"; btn.innerText=opt;
                    btn.onclick=()=>{
                        if(opt === q.correct) {
                            if(isRace) { raceProgress += (100/d.questions.length); document.getElementById('runner').style.left = raceProgress + "%"; }
                            btn.className="mc-btn correct"; setTimeout(()=>renderQ(idx+1), 500);
                        } else { btn.className="mc-btn wrong"; setTimeout(()=>btn.className="mc-btn", 500); }
                    };
                    box.querySelector('.mc-options').appendChild(btn);
                });
            };
            renderQ(0);
        }

        function renderJoin(id, container) {
            const d = exerciseData[id]; let h = `<div class='cloze-text'>`;
            d.items.forEach((it, i) => h += `<div style='margin-bottom:15px'>Combine: "${it.s1}" + "${it.s2}"<br>${it.head} <input type='text' id='j-${id}-${i}' class='gap-input' style='width:250px' autocomplete="off"> <div id="j-fb-${id}-${i}" class="feedback-box"></div></div>`);
            h += `</div><button class='exercise-button' style='margin:20px auto; display:block;' onclick='checkJoin("${id}")'>Check</button>`;
            container.innerHTML = h;
            window.checkJoin=(id)=>{
                let ok=0; const d = exerciseData[id]; 
                d.items.forEach((it,i)=>{
                    const inp = document.getElementById(`j-${id}-${i}`);
                    const fb = document.getElementById(`j-fb-${id}-${i}`);
                    if(inp.value.toLowerCase().trim() === it.correct.toLowerCase()) {
                        inp.className = "gap-input correct"; fb.style.display="none"; ok++;
                    } else {
                        inp.className = "gap-input incorrect";
                        fb.innerHTML = `Solution: <b>${it.correct}</b>`; fb.style.display="block";
                    }
                });
                if(ok===d.items.length) markDone(3);
            };
        }

        function renderFactory(id, container) {
            const d = exerciseData[id]; let h=`<table class="factory-table"><thead><tr><th>Adj</th><th>Adv</th></tr></thead><tbody>`;
            d.items.forEach((it, i) => h+=`<tr><td>${it.adj}</td><td><input id="fac-${id}-${i}" class="gap-input" data-ans="${it.correct}" autocomplete="off"></td></tr>`);
            h+=`</tbody></table><button class="exercise-button" style="margin:20px auto" onclick="checkFactoryTable('${id}')">Check</button>`;
            container.innerHTML = h;
            window.checkFactoryTable=(id)=>{
                let ok=0; const d = exerciseData[id]; d.items.forEach((it,i)=>{
                    const el=document.getElementById(`fac-${id}-${i}`);
                    if(el.value.toLowerCase().trim()===it.correct) { el.className="gap-input correct"; ok++; } else el.className="gap-input incorrect";
                });
                if(ok===d.items.length) markDone(id.split('_').pop());
            };
        }

        function markDone(num) {
            const fid = `${currentTopicId}_${num}`; state[fid] = true; localStorage.setItem('grammar_g7_vfinal_topicbadges', JSON.stringify(state));
            updateStatus(num); checkMaster(); alert("Klasse! Übung abgeschlossen.");
        }
        function updateStatus(num) {
            const id = `${currentTopicId}_${num}`; const item = document.getElementById('item-ex' + num); const status = document.getElementById('status-ex' + num); const header = item.querySelector('.accordion-header');
            if (state[id]) { item.classList.add('done'); status.innerText = "✅ Completed"; header.classList.add('done-header'); } 
            else { item.classList.remove('done'); status.innerText = "🔒 Locked"; header.classList.remove('done-header'); }
        }
        function checkMaster() {
            const meta = topicMeta[currentTopicId]; if (!meta) return;
            const all = []; for(let i=1; i<=meta.count; i++) { all.push(state[`${currentTopicId}_${i}`]); }
            if (all.every(val => val)) {
                document.getElementById('master-badge-container').style.display = 'block';
                document.getElementById('master-code-display').innerText = generateCode(currentTopicId + "_MASTER");
                const btn = document.getElementById('btn-' + currentTopicId); if(btn) btn.classList.add('completed');
            } else { document.getElementById('master-badge-container').style.display = 'none'; }
        }
        function generateCode(id) { let hash = 0; const str = id + secretKey; for (let i = 0; i < str.length; i++) { hash = ((hash << 5) - hash) + str.charCodeAt(i); hash |= 0; } return id + "-" + Math.abs(hash).toString(16).toUpperCase().substring(0, 4); }
        function validateTeacherCode() {
            const input = document.getElementById('teacher-input').value.toUpperCase().trim();
            const output = document.getElementById('teacher-output');
            let found = false;
            Object.keys(topicMeta).forEach(id => {
                if (generateCode(id + "_MASTER") === input) {
                    output.innerHTML = `<span style="color:var(--success-color)">✓ Gültig: ${topicMeta[id].title}</span>`;
                    found = true;
                }
            });
            if (!found) output.innerHTML = `<span style="color:var(--error-color)">✗ Ungültig!</span>`;
        }
        function printCertificate() {
            const name = prompt("Bitte gib deinen Namen für das Zertifikat ein:") || "[Name des Schülers]";
            document.querySelector('#cert-print-view h2').innerText = name;
            document.getElementById('cert-grade-display').innerText = "Klasse 7";
            document.getElementById('cert-date').innerText = new Date().toLocaleDateString('de-DE') + ", Mellrichstadt";
            
            let listHtml = "<ul>";
            Object.keys(topicMeta).forEach(id => {
                const meta = topicMeta[id];
                const allDone = Array.from({length: meta.count}, (_, i) => state[`${id}_${i+1}`]).every(Boolean);
                if (allDone) {
                    listHtml += `<li><b>${meta.title}</b> <span style="float:right; font-family:monospace;">${generateCode(id+"_MASTER")}</span></li>`;
                }
            });
            listHtml += "</ul>";
            document.getElementById('cert-module-list').innerHTML = listHtml;
            window.print();
        }

        window.onload = () => { Object.keys(topicMeta).forEach(t => { 
            const meta = topicMeta[t]; const all = []; for(let i=1; i<=meta.count; i++) { all.push(state[`${t}_${i}`]); }
            if(all.every(v => v)) { const btn = document.getElementById('btn-' + t); if(btn) btn.classList.add('completed'); } 
        }); };
    </script>
</body>
</html>
